name: kawiarnia
description: "A comprehensive Coffee Shop management application built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  provider: ^6.1.2
  badges: ^3.1.2
  intl: ^0.19.0
  firebase_messaging: ^14.9.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  http: ^1.1.0
  mobile_scanner: ^6.0.2 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
